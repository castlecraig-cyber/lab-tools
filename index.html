<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Lab Tools</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lab Tools">
<link rel="apple-touch-icon" href="icon.svg">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #181824; color: #dde1f0; min-height: 100vh; display: flex; flex-direction: column; }

/* ── Topbar ── */
.topbar { background: #1e1e30; border-bottom: 1px solid #2e2e45; padding: 10px 14px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; position: sticky; top: 0; z-index: 50; }
.rig-section { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.rig-label { color: #f5a623; font-weight: bold; font-size: 0.88rem; letter-spacing: 0.08em; }
.rig-input { background: #252538; border: 1.5px solid #4a3800; border-radius: 7px; color: #f5a623; font-size: 1.1rem; font-weight: bold; text-align: center; width: 64px; padding: 6px; outline: none; -moz-appearance: textfield; }
.rig-input::-webkit-inner-spin-button, .rig-input::-webkit-outer-spin-button { -webkit-appearance: none; }
.rig-input:focus { border-color: #f5a623; }
.notes-input { flex: 1; min-width: 100px; background: #22223a; border: 1px solid #35355a; border-radius: 7px; color: #c0c8e0; font-size: 0.82rem; padding: 6px 10px; outline: none; resize: none; height: 38px; line-height: 1.4; font-family: Arial, sans-serif; }
.notes-input:focus { border-color: #5555aa; }
.notes-input::placeholder { color: #44446a; }
.btn-settings { background: #22224a; border: 1px solid #3a3a6a; border-radius: 8px; color: #b0a0f8; padding: 8px 14px; font-size: 0.88rem; cursor: pointer; white-space: nowrap; }
.btn-settings:hover { border-color: #a78bfa; }

/* ── Main ── */
.main { flex: 1; padding: 16px 14px 14px; }
.offset-box { background: #1e1e1e; border: 1px dashed #2e2e2e; border-radius: 8px; padding: 9px 14px; margin-bottom: 14px; text-align: center; font-size: 0.84rem; color: #555; transition: all 0.3s; }
.offset-box.active { border-color: #3db843; color: #3db843; background: #0a1a0a; border-style: solid; }

/* ── Table (desktop) ── */
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; margin-bottom: 14px; min-width: 620px; }
thead th { padding: 9px 7px; font-size: 0.72rem; text-align: center; letter-spacing: 0.05em; text-transform: uppercase; border-bottom: 2px solid #2e2e4a; white-space: nowrap; }
th.col-num  { color: #5a5a8a; width: 44px; }
th.col-ind  { color: #f07878; }
th.col-bath { color: #5dd865; }
th.col-sc   { color: #b0a0f8; }
th.col-del  { width: 44px; }
td { padding: 4px 5px; text-align: center; border-bottom: 1px solid #23233a; vertical-align: middle; }
tr.ref-row td  { background: #1e1a06; }
tr.data-row:hover td { background: #202035; }
tr.ramp-row td { background: #14142e; border-bottom-color: #1e1e42; }
tr.ramp-row:hover td { background: #1a1a38; }

/* Inputs */
.bath-input { width: 100%; padding: 7px 4px; border: 1.5px solid #35354e; border-radius: 6px; font-size: 0.9rem; text-align: center; outline: none; background: #20203a; color: #dde1f0; -moz-appearance: textfield; }
.bath-input::-webkit-inner-spin-button, .bath-input::-webkit-outer-spin-button { -webkit-appearance: none; }
.bath-input:focus { border-color: #f07878; }
.ref-row .bath-input:focus { border-color: #f5a623; }
.temp-cell { display: flex; flex-direction: column; gap: 2px; }
.temp-lbl { font-size: 0.6rem; letter-spacing: 0.06em; text-transform: uppercase; text-align: center; }
.temp-lbl.tl-s { color: #7ac0f8; }
.temp-lbl.tl-e { color: #f8b070; }
.temp-input { width: 100%; padding: 7px 4px; border: 1.5px solid #2a2a50; border-radius: 6px; font-size: 0.9rem; text-align: center; outline: none; background: #18183a; color: #dde1f0; -moz-appearance: textfield; }
.temp-input::-webkit-inner-spin-button, .temp-input::-webkit-outer-spin-button { -webkit-appearance: none; }
.temp-input:focus { border-color: #7ac0f8; }
.calc-value { font-size: 0.95rem; font-weight: bold; color: #5dd865; }
.calc-empty { color: #3a3a5a; }
.row-num { color: #6060a0; font-size: 0.78rem; }
.ref-badge  { background: #f5a623; color: #000; border-radius: 4px; font-size: 0.6rem; font-weight: bold; padding: 2px 5px; display: inline-block; }
.ramp-badge { background: #3a2a6a; color: #c4b5fd; border-radius: 4px; font-size: 0.6rem; font-weight: bold; padding: 2px 4px; display: inline-block; }

/* SC cell */
.sc-cell { padding: 5px 7px !important; }
.sc-line { display: flex; align-items: center; gap: 5px; margin-bottom: 4px; flex-wrap: wrap; }
.sc-line:last-child { margin-bottom: 0; }
.dt-input { flex: 1; min-width: 140px; background: #1e1e3a; border: 1.5px solid #35355a; border-radius: 6px; color: #c8b8ff; font-size: 0.78rem; padding: 6px 3px; outline: none; }
.dt-input:focus { border-color: #a78bfa; }
.dt-input::-webkit-calendar-picker-indicator { filter: invert(0.7) sepia(1) hue-rotate(240deg); cursor: pointer; }
.dur-input { width: 92px; background: #1a1a3a; border: 1.5px solid #35355a; border-radius: 6px; color: #7dd3fc; font-size: 0.8rem; padding: 6px 4px; outline: none; text-align: center; font-family: 'Courier New', monospace; letter-spacing: 1px; }
.dur-input:focus { border-color: #7dd3fc; }
.rate-input { flex: 1; min-width: 60px; background: #1a1a3a; border: 1.5px solid #35355a; border-radius: 6px; color: #f8b870; font-size: 0.8rem; padding: 6px 4px; outline: none; text-align: center; }
.rate-input:focus { border-color: #f8b870; }
.rate-lbl { font-size: 0.65rem; color: #3a3a3a; white-space: nowrap; }

.btn-play { flex-shrink: 0; width: 34px; height: 34px; border-radius: 50%; background: radial-gradient(circle at 40% 35%, #2a4a2a, #0f1f0f); border: 2px solid #3db843; color: #3db843; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.18s; padding: 0; touch-action: manipulation; }
.btn-play svg { display: block; pointer-events: none; }
.btn-play:hover { box-shadow: 0 0 12px rgba(61,184,67,0.4); transform: scale(1.07); }
.btn-play.running { border-color: #f87171; background: radial-gradient(circle at 40% 35%, #4a1a1a, #1f0808); color: #f87171; }

.sc-bot { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.sc-lbl { font-size: 0.6rem; color: #333; text-transform: uppercase; letter-spacing: 0.06em; }
.cd-display { font-size: 0.98rem; font-weight: bold; color: #2a2a2a; font-variant-numeric: tabular-nums; letter-spacing: 2px; font-family: 'Courier New', monospace; }
.cd-display.ticking { color: #a78bfa; }
.cd-display.done    { color: #f87171; font-size: 0.82rem; letter-spacing: 0; }
.finish-time { font-size: 0.72rem; color: #1e3a1e; font-family: 'Courier New', monospace; margin-left: auto; white-space: nowrap; }
.finish-time.set { color: #3db843; }

.btn-del { background: rgba(220,60,60,0.12); border: 1px solid rgba(220,60,60,0.35); color: #e06060; font-size: 1rem; cursor: pointer; padding: 6px 10px; border-radius: 6px; transition: all 0.18s; touch-action: manipulation; font-weight: bold; }
.btn-del:hover, .btn-del:active { background: rgba(220,60,60,0.28); border-color: #e03535; color: #ff6060; }
.btn-cal { background: none; border: 1px solid #1e3a1e; border-radius: 5px; font-size: 0.9rem; cursor: pointer; padding: 2px 5px; opacity: 0.55; transition: opacity 0.2s; flex-shrink: 0; touch-action: manipulation; line-height: 1; }
.btn-cal:hover { opacity: 1; border-color: #3db843; }
.notif-bar { font-size: 0.68rem; color: #333; margin-top: 3px; display: flex; align-items: center; gap: 5px; }
.notif-bar.granted { color: #2a5a2a; }
.btn-row-group { display: flex; gap: 10px; flex-wrap: wrap; }
.btn-add      { padding: 11px 18px; background: linear-gradient(135deg,#162016,#0f180f); color: #3db843; border: 1px solid #1e401e; border-radius: 8px; font-size: 0.9rem; font-weight: bold; cursor: pointer; touch-action: manipulation; }
.btn-add-ramp { padding: 11px 18px; background: linear-gradient(135deg,#12102a,#0a0818); color: #a78bfa; border: 1px solid #2a2050; border-radius: 8px; font-size: 0.9rem; font-weight: bold; cursor: pointer; touch-action: manipulation; }
.btn-add:hover { border-color: #3db843; }
.btn-add-ramp:hover { border-color: #a78bfa; }

/* ── Sheet bar ── */
#sheetBar { background: #12121e; border-top: 2px solid #2a2a40; display: flex; align-items: flex-end; padding: 0 12px; gap: 2px; min-height: 36px; position: sticky; bottom: 0; z-index: 50; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.sheet-tab { padding: 7px 10px 7px 14px; font-size: 0.78rem; color: #5a5a8a; background: #18182a; border: 1px solid #2a2a42; border-bottom: none; border-radius: 5px 5px 0 0; cursor: pointer; white-space: nowrap; user-select: none; display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.sheet-tab.active { color: #f5a623; background: #181824; border-color: #4a3800; font-weight: bold; }
.sheet-tab-name { flex: 1; }
.sheet-tab-del { background: none; border: none; color: #555; font-size: 0.85rem; cursor: pointer; padding: 0 2px; line-height: 1; }
.sheet-tab-del:hover { color: #e03535; }
.sheet-tab.active .sheet-tab-del { color: #8a6a00; }
.sheet-add-btn { background: none; border: 1px solid #2a2a42; border-radius: 5px; color: #555; font-size: 1rem; width: 26px; height: 26px; margin-bottom: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-left: 4px; flex-shrink: 0; }
.sheet-add-btn:hover { color: #f5a623; border-color: #f5a623; }

/* ── Settings modal ── */
#settingsOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; padding: 16px; }
#settingsPanel { background: #1e1e30; border: 1px solid #2e2e4a; border-radius: 16px; padding: 22px; width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto; }
.s-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.s-header h2 { color: #a78bfa; font-size: 1.05rem; }
.btn-close { background: none; border: none; color: #444; font-size: 1.3rem; cursor: pointer; padding: 4px 8px; }
.btn-close:hover { color: #e8e8e8; }
.s-clock { background: #1a1a2a; border: 1px solid #242438; border-radius: 10px; padding: 14px; margin-bottom: 16px; }
.s-clock-row { display: flex; justify-content: space-around; gap: 12px; }
.s-clock-box { text-align: center; }
.s-clock-box .city { font-size: 0.72rem; color: #555; margin-bottom: 4px; }
.s-clock-box .time-d { font-size: 1.4rem; font-weight: bold; letter-spacing: 3px; }
.time-d.edin { color: #7dd3fc; }
.time-d.utc-d { color: #555; font-size: 1rem; }
.s-clock-box .date-s { font-size: 0.68rem; color: #444; margin-top: 3px; }
.sync-note { font-size: 0.68rem; color: #3a3a3a; text-align: center; margin-top: 8px; }
.s-section label { display: block; font-size: 0.78rem; color: #666; margin-bottom: 8px; }
.s-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
.s-row select, .s-row input[type=number] { background: #0d0d0d; border: 1px solid #2a2a2a; color: #e8e8e8; border-radius: 7px; padding: 8px 10px; font-size: 0.88rem; outline: none; flex: 1; min-width: 0; }
.s-row select:focus, .s-row input:focus { border-color: #a78bfa; }
.btn-reset { background: #1a1a1a; border: 1px solid #2a2a2a; color: #888; padding: 8px 14px; border-radius: 7px; font-size: 0.82rem; cursor: pointer; white-space: nowrap; }
.btn-reset:hover { border-color: #7c3aed; color: #fff; }
#offsetDisplay { font-size: 0.72rem; color: #444; margin-top: 6px; }

/* ════════════════════════════════════
   MOBILE RESPONSIVE — card layout
   ════════════════════════════════════ */
@media (max-width: 620px) {
  .table-wrap { overflow: visible; }
  table, tbody { display: block; min-width: 0; }
  thead { display: none; }

  /* Each row becomes a card */
  tr {
    display: grid;
    grid-template-columns: 48px 1fr 1fr 40px;
    grid-template-areas:
      "num a b del"
      ". sc sc .";
    gap: 6px 8px;
    border: 1px solid #2e2e4a;
    border-radius: 10px;
    padding: 8px 10px;
    margin-bottom: 10px;
  }
  tr.ref-row { border-color: #4a3800; background: #1a1500; }
  tr.ramp-row { border-color: #2a2a5a; background: #101028; }

  .td-num { grid-area: num; align-self: center; text-align: center; border: none !important; }
  .td-a   { grid-area: a;   border: none !important; }
  .td-b   { grid-area: b;   border: none !important; }
  .td-sc  { grid-area: sc;  border: none !important; padding: 2px 0 !important; }
  .td-del { grid-area: del; align-self: center; text-align: center; border: none !important; }

  /* Larger touch targets */
  .bath-input, .temp-input { padding: 11px 6px; font-size: 1rem; }
  .dt-input  { font-size: 0.85rem; padding: 10px 5px; min-width: 0; }
  .dur-input { width: auto; flex: 1; padding: 10px 5px; font-size: 0.85rem; }
  .rate-input { padding: 10px 5px; font-size: 0.85rem; }
  .btn-play  { width: 42px; height: 42px; }
  .btn-del   { font-size: 1.1rem; padding: 8px 10px; }

  .finish-time { margin-left: 0; font-size: 0.7rem; }
  .cd-display { font-size: 1rem; }

  /* Topbar: notes full width on very small screens */
  .notes-input { min-width: 120px; }
}
</style>
</head>
<body>

<!-- Settings modal -->
<div id="settingsOverlay" onclick="overlayClick(event)">
  <div id="settingsPanel">
    <div class="s-header">
      <h2>⚙ Time Settings</h2>
      <button class="btn-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="s-clock">
      <div class="s-clock-row">
        <div class="s-clock-box">
          <div class="city">🏴󠁧󠁢󠁳󠁣󠁴󠁿 Edinburgh (Local)</div>
          <div class="time-d edin" id="localClock">--:--:--</div>
          <div class="date-s" id="localDate"></div>
        </div>
        <div class="s-clock-box">
          <div class="city">🌐 UTC</div>
          <div class="time-d utc-d" id="utcClock">--:--:--</div>
        </div>
      </div>
      <div class="sync-note" id="syncNote">Syncing...</div>
    </div>
    <div class="s-section">
      <label>Timezone Override</label>
      <div class="s-row">
        <select id="tzPreset" onchange="applyPreset()">
          <option value="">— Select preset —</option>
          <option value="0">UTC+0  (Edinburgh / London Winter)</option>
          <option value="1">UTC+1  (Edinburgh BST Summer)</option>
          <option value="2">UTC+2</option>
          <option value="3">UTC+3</option>
          <option value="3.5">UTC+3:30  (Tehran Winter)</option>
          <option value="4.5">UTC+4:30  (Tehran Summer)</option>
          <option value="5">UTC+5</option>
          <option value="8">UTC+8</option>
        </select>
      </div>
      <div class="s-row">
        <input type="number" id="manualOffset" placeholder="Manual offset (e.g. 3.5)" step="0.5" oninput="applyManual()" />
        <button class="btn-reset" onclick="resetOffset()">Reset</button>
      </div>
      <div id="offsetDisplay">Current offset: using system clock</div>
    </div>
  </div>
</div>

<!-- Topbar -->
<div class="topbar">
  <div class="rig-section">
    <span class="rig-label">RIG #</span>
    <input type="number" class="rig-input" id="rigNumber" value="3" min="1" oninput="saveRigNumber()">
  </div>
  <textarea class="notes-input" id="notesInput" placeholder="Notes..." oninput="saveNotes()" rows="1"></textarea>
  <button class="btn-settings" onclick="openSettings()">⚙ Settings</button>
</div>

<!-- Main -->
<div class="main">
  <div class="offset-box" id="offsetBox">Waiting for reference row input...</div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="col-num">#</th>
          <th class="col-ind">Indicator °C</th>
          <th class="col-bath">Bath °C</th>
          <th class="col-sc">Start &amp; Duration → Countdown → Finish</th>
          <th class="col-del"></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="btn-row-group">
    <button class="btn-add"      onclick="addDataRow()">+ Add Row</button>
    <button class="btn-add-ramp" onclick="addRampRow()">+ Add Ramp</button>
  </div>
</div>

<div id="sheetBar"></div>

<script>
const SVG_PLAY='<svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor"><path d="M8 5.14v14l11-7z"/></svg>';
const SVG_STOP='<svg viewBox="0 0 24 24" width="11" height="11" fill="currentColor"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>';
const STORAGE_KEY='labTools_v4';

/* ── Audio (unlock on first user tap) ── */
let audioCtx=null;
function initAudio(){
  if(audioCtx) return;
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const b=audioCtx.createBuffer(1,1,22050),s=audioCtx.createBufferSource();
    s.buffer=b;s.connect(audioCtx.destination);s.start(0);
  }catch(e){}
}
function playAlarm(){
  if(!audioCtx) return;
  try{
    if(audioCtx.state==='suspended') audioCtx.resume();
    const now=audioCtx.currentTime;
    [[880,0,.28],[880,.35,.28],[1100,.7,.45],[880,1.25,.28],[880,1.6,.28],[1100,1.95,.55]].forEach(([freq,t,dur])=>{
      const osc=audioCtx.createOscillator(),gain=audioCtx.createGain();
      osc.connect(gain);gain.connect(audioCtx.destination);
      osc.type='sine';osc.frequency.value=freq;
      gain.gain.setValueAtTime(0.35,now+t);
      gain.gain.exponentialRampToValueAtTime(0.001,now+t+dur);
      osc.start(now+t);osc.stop(now+t+dur+.05);
    });
  }catch(e){}
}

/* ── Notifications ── */
async function requestNotifPermission(){
  if(!('Notification'in window)) return;
  if(Notification.permission==='default') await Notification.requestPermission();
}
function showNotification(title,body){
  if(!('Notification'in window)||Notification.permission!=='granted') return;
  try{ new Notification(title,{body,silent:false}); }catch(e){}
}
function doAlarm(rowId){
  playAlarm();
  if('vibrate'in navigator) navigator.vibrate([300,100,300,100,500]);
  const row=sheetsData[currentSheetIdx].rows.find(r=>r.id===rowId);
  if(!row) return;
  const sheet=sheetsData[currentSheetIdx];
  const idx=sheet.rows.indexOf(row)+1;
  const lbl=row.type==='ramp'?'Ramp ':'Row ';
  showNotification(sheet.name+' — '+lbl+idx+' Done! ⏰','Finished at '+formatFinish(row.targetMs));
}

/* ── ICS Calendar download ── */
function downloadICS(rowId){
  const row=sheetsData[currentSheetIdx].rows.find(r=>r.id===rowId);
  if(!row||!row.targetMs){alert('Start the countdown first.');return;}
  const sheet=sheetsData[currentSheetIdx];
  const idx=sheet.rows.indexOf(row)+1;
  const lbl=row.type==='ramp'?'Ramp ':'Row ';
  const summary=sheet.name+' — '+lbl+idx+' Finish';
  const desc=row.type==='ramp'
    ?'Ramp from '+(row.startTemp||'?')+'°C to '+(row.endTemp||'?')+'°C\\nDuration: '+(row.durationStr||'?')+' | Rate: '+(row.rateStr||'?')+' °C/h'
    :'Indicator: '+(row.indVal||'?')+'°C | Duration: '+(row.durationStr||'?');
  function icsDate(ms){const d=new Date(ms);return d.getUTCFullYear()+pad(d.getUTCMonth()+1)+pad(d.getUTCDate())+'T'+pad(d.getUTCHours())+pad(d.getUTCMinutes())+pad(d.getUTCSeconds())+'Z';}
  const ics=[
    'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Lab Tools//EN','CALSCALE:GREGORIAN','METHOD:PUBLISH',
    'BEGIN:VEVENT',
    'UID:labtools-'+rowId+'-'+Date.now()+'@labtools',
    'DTSTAMP:'+icsDate(Date.now()),
    'DTSTART:'+icsDate(row.targetMs),
    'DTEND:'+icsDate(row.targetMs+900000),
    'SUMMARY:'+summary,
    'DESCRIPTION:'+desc,
    'BEGIN:VALARM','ACTION:DISPLAY','DESCRIPTION:'+summary,'TRIGGER:-PT0S','END:VALARM',
    'BEGIN:VALARM','ACTION:AUDIO','TRIGGER:-PT0S','END:VALARM',
    'END:VEVENT','END:VCALENDAR'
  ].join('\r\n');
  const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  a.download=(lbl+idx+'_'+sheet.name).replace(/\s+/g,'_')+'.ics';
  document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
}

let serverOffset=0, manualTzOffset=null, bathCalcOffset=null, rowIdCounter=0;
const rowTimers={};
let sheetsData=[{name:'RIG 3',rigNumber:3,refInd:'',refBath:'',notes:'',rows:[]}];
let currentSheetIdx=0;

/* ── Storage ── */
function saveToStorage(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify({sheetsData,rowIdCounter,currentSheetIdx}));}catch(e){}}
function loadFromStorage(){
  try{
    // Try v4 first, then migrate from v3
    let raw=localStorage.getItem(STORAGE_KEY)||localStorage.getItem('labTools_v3');
    if(!raw) return false;
    const d=JSON.parse(raw);
    if(!d.sheetsData||!d.sheetsData.length) return false;
    // Migrate: ensure all rows have type and all sheets have notes
    d.sheetsData.forEach(s=>{
      if(!s.notes) s.notes='';
      (s.rows||[]).forEach(r=>{if(!r.type)r.type='data';});
    });
    sheetsData=d.sheetsData;
    rowIdCounter=d.rowIdCounter||0;
    currentSheetIdx=Math.min(d.currentSheetIdx||0,sheetsData.length-1);
    return true;
  }catch(e){return false;}
}

/* ── Utilities ── */
function realUtcMs(){return Date.now()+serverOffset;}
function pad(n){return String(Math.floor(Math.abs(n))).padStart(2,'0');}
function parseDuration(str){
  if(!str||!str.trim()) return NaN;
  const p=str.trim().split(':');
  if(p.length<2||p.length>3) return NaN;
  const h=parseInt(p[0]),m=parseInt(p[1]),s=p.length===3?parseInt(p[2]):0;
  if(isNaN(h)||isNaN(m)||isNaN(s)||m<0||m>59||s<0||s>59) return NaN;
  return(Math.abs(h)*3600+m*60+s)*1000;
}
function msToDur(ms){const t=Math.round(Math.abs(ms)/1000);return pad(Math.floor(t/3600))+':'+pad(Math.floor((t%3600)/60))+':'+pad(t%60);}
function calcRate(st,et,durStr){
  const a=parseFloat(st),b=parseFloat(et),dms=parseDuration(durStr);
  if(isNaN(a)||isNaN(b)||isNaN(dms)||dms===0) return '';
  const r=(b-a)/(dms/3600000);
  return(r>=0?'+':'')+r.toFixed(3);
}
function calcDur(st,et,rateStr){
  const a=parseFloat(st),b=parseFloat(et),r=parseFloat(rateStr);
  if(isNaN(a)||isNaN(b)||isNaN(r)||r===0) return '';
  return msToDur(Math.abs(b-a)/Math.abs(r)*3600000);
}
function formatFinish(tMs){
  if(!tMs) return '';
  if(manualTzOffset!==null){const d=new Date(tMs);return d.getUTCFullYear()+'-'+pad(d.getUTCMonth()+1)+'-'+pad(d.getUTCDate())+'  '+pad(d.getUTCHours())+':'+pad(d.getUTCMinutes());}
  const d=new Date(tMs);
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'  '+pad(d.getHours())+':'+pad(d.getMinutes());
}
/* Convert datetime-local string to UTC ms, correcting for timezone */
function localStrToTargetMs(dtStr,durationMs){
  if(!dtStr) return NaN;
  let startMs=new Date(dtStr).getTime(); // parsed as system local → UTC ms
  if(manualTzOffset!==null){
    // User typed time in manualTz. Browser treated it as system local.
    // We need UTC for the intended time: UTC = typed_time - manualOffset
    // typed_time in UTC = startMs + sysOffsetMs  (cancel system interpretation)
    // then subtract manual offset to get real UTC
    const sysOffMs=-(new Date().getTimezoneOffset())*60000; // +ve = east of UTC
    startMs=startMs+sysOffMs-manualTzOffset*3600000;
  }
  return startMs+durationMs;
}

/* ── Clock ── */
setInterval(()=>{
  const u=realUtcMs(),ud=new Date(u);
  const uel=document.getElementById('utcClock');
  if(uel)uel.textContent=pad(ud.getUTCHours())+':'+pad(ud.getUTCMinutes())+':'+pad(ud.getUTCSeconds());
  const le=document.getElementById('localClock'),de=document.getElementById('localDate');
  if(manualTzOffset!==null){
    const d=new Date(u+manualTzOffset*3600000);
    if(le)le.textContent=pad(d.getUTCHours())+':'+pad(d.getUTCMinutes())+':'+pad(d.getUTCSeconds());
    if(de)de.textContent=d.getUTCFullYear()+'-'+pad(d.getUTCMonth()+1)+'-'+pad(d.getUTCDate());
  }else{
    const d=new Date(u);
    if(le)le.textContent=pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());
    if(de)de.textContent=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
  }
},1000);

async function syncTime(){
  try{
    const r=await fetch('https://worldtimeapi.org/api/timezone/UTC');
    const d=await r.json();
    serverOffset=new Date(d.utc_datetime).getTime()-Date.now();
    const el=document.getElementById('syncNote');
    if(el)el.textContent='✓ Synced ('+(serverOffset>=0?'+':'')+Math.round(serverOffset/1000)+'s)';
  }catch{
    serverOffset=0;
    const el=document.getElementById('syncNote');
    if(el)el.textContent='⚠ Sync failed — using system clock';
  }
}

/* ── Settings ── */
function openSettings(){document.getElementById('settingsOverlay').style.display='flex';}
function closeSettings(){document.getElementById('settingsOverlay').style.display='none';}
function overlayClick(e){if(e.target===document.getElementById('settingsOverlay'))closeSettings();}
function applyPreset(){const v=document.getElementById('tzPreset').value;manualTzOffset=v===''?null:parseFloat(v);document.getElementById('manualOffset').value='';updateTzDisplay();}
function applyManual(){const v=document.getElementById('manualOffset').value;manualTzOffset=v===''?null:parseFloat(v);document.getElementById('tzPreset').value='';updateTzDisplay();}
function resetOffset(){manualTzOffset=null;document.getElementById('tzPreset').value='';document.getElementById('manualOffset').value='';updateTzDisplay();}
function updateTzDisplay(){const el=document.getElementById('offsetDisplay');if(el)el.textContent=manualTzOffset===null?'Current offset: using system clock':'Current offset: UTC'+(manualTzOffset>=0?'+':'')+manualTzOffset;}

/* ── Rig & Notes ── */
function saveRigNumber(){
  const v=parseInt(document.getElementById('rigNumber').value),n=isNaN(v)?3:v;
  sheetsData[currentSheetIdx].rigNumber=n;sheetsData[currentSheetIdx].name='RIG '+n;
  updateSheetTabs();saveToStorage();
}
function saveNotes(){sheetsData[currentSheetIdx].notes=document.getElementById('notesInput').value;saveToStorage();}

/* ── Bath offset ── */
function recalcBathOffset(){
  const iv=parseFloat(document.getElementById('ind_ref')?.value);
  const bv=parseFloat(document.getElementById('bath_ref')?.value);
  const box=document.getElementById('offsetBox');
  if(!isNaN(iv)&&!isNaN(bv)){
    bathCalcOffset=bv-iv;
    const sign=bathCalcOffset>=0?'+':'';
    box.className='offset-box active';
    box.innerHTML='<b>Offset:</b> '+sign+bathCalcOffset.toFixed(4)+' °C &nbsp;|&nbsp; Bath = Indicator '+sign+bathCalcOffset.toFixed(4);
  }else{bathCalcOffset=null;box.className='offset-box';box.textContent='Waiting for reference row input...';}
  recalcAllBath();
}
function recalcAllBath(){
  sheetsData[currentSheetIdx].rows.forEach(row=>{
    if(row.type==='ramp') return;
    const cell=document.getElementById('bath_'+row.id);if(!cell)return;
    const ind=parseFloat(row.indVal);
    if(bathCalcOffset!==null&&!isNaN(ind)){cell.textContent=(ind+bathCalcOffset).toFixed(2);cell.className='calc-value';}
    else{cell.textContent='—';cell.className='calc-value calc-empty';}
  });
}

/* ── Countdown per row ── */
function toggleRowTimer(rowId){if(rowTimers[rowId])stopRowTimer(rowId);else startRowTimer(rowId);}

function startRowTimer(rowId){
  initAudio();
  requestNotifPermission();
  const row=sheetsData[currentSheetIdx].rows.find(r=>r.id===rowId);
  const startEl=document.getElementById('start_'+rowId);
  const durEl=document.getElementById('dur_'+rowId);
  const cdEl=document.getElementById('cd_'+rowId);
  const finEl=document.getElementById('fin_'+rowId);
  const btn=document.getElementById('playbtn_'+rowId);
  if(!row||!startEl||!durEl||!cdEl||!btn) return;

  if(!startEl.value){cdEl.textContent='Set start time';cdEl.className='cd-display done';return;}
  const dms=parseDuration(durEl.value);
  if(isNaN(dms)||dms===0){cdEl.textContent='Set duration / rate';cdEl.className='cd-display done';return;}

  row.startDateStr=startEl.value;row.durationStr=durEl.value;
  // ── FIXED timezone formula ──
  row.targetMs=localStrToTargetMs(startEl.value,dms);

  if(rowTimers[rowId])clearInterval(rowTimers[rowId]);
  rowTimers[rowId]=setInterval(()=>tickRow(rowId),1000);
  tickRow(rowId);
  btn.innerHTML=SVG_STOP;btn.classList.add('running');
  if(finEl){finEl.textContent='Finish: '+formatFinish(row.targetMs);finEl.className='finish-time set';}
  const calBtn=document.getElementById('calbtn_'+rowId);if(calBtn)calBtn.style.display='';
  saveToStorage();
}
function stopRowTimer(rowId){
  if(rowTimers[rowId]){clearInterval(rowTimers[rowId]);delete rowTimers[rowId];}
  const btn=document.getElementById('playbtn_'+rowId);
  if(btn){btn.innerHTML=SVG_PLAY;btn.classList.remove('running');}
}
function stopAllTimers(){Object.keys(rowTimers).forEach(id=>{clearInterval(rowTimers[id]);delete rowTimers[id];});}
function tickRow(rowId){
  const row=sheetsData[currentSheetIdx].rows.find(r=>r.id===rowId);
  const cdEl=document.getElementById('cd_'+rowId);
  if(!row||!row.targetMs||!cdEl) return;
  const diff=row.targetMs-realUtcMs();
  if(diff<=0){cdEl.textContent='⏰ 00:00:00';cdEl.className='cd-display done';doAlarm(rowId);stopRowTimer(rowId);return;}
  const ts=Math.floor(diff/1000);
  cdEl.textContent=pad(Math.floor(ts/3600))+':'+pad(Math.floor((ts%3600)/60))+':'+pad(ts%60);
  cdEl.className='cd-display ticking';
}

/* ── Ramp helpers ── */
function getLastTemp(){
  const rows=sheetsData[currentSheetIdx].rows;
  for(let i=rows.length-1;i>=0;i--){
    const v=parseFloat(rows[i].type==='ramp'?rows[i].endTemp:rows[i].indVal);
    if(!isNaN(v))return String(v);
  }
  return '';
}
function updateRampDerived(row){
  if(row.lastEdited==='rate'&&row.rateStr){
    const dur=calcDur(row.startTemp,row.endTemp,row.rateStr);
    if(dur){const el=document.getElementById('dur_'+row.id);if(el)el.value=dur;row.durationStr=dur;}
  }else if(row.durationStr){
    const rate=calcRate(row.startTemp,row.endTemp,row.durationStr);
    if(rate!==''){const el=document.getElementById('rate_'+row.id);if(el)el.value=rate;row.rateStr=rate;}
  }
}

/* ── Build SC bottom (shared) ── */
function buildScBottom(row){
  const bot=document.createElement('div');bot.className='sc-bot';
  const lbl=document.createElement('span');lbl.className='sc-lbl';lbl.textContent='Offset';bot.appendChild(lbl);
  const cd=document.createElement('span');cd.className='cd-display';cd.id='cd_'+row.id;cd.textContent='--:--:--';bot.appendChild(cd);
  const fin=document.createElement('span');fin.className='finish-time';fin.id='fin_'+row.id;
  if(row.targetMs){fin.textContent='Finish: '+formatFinish(row.targetMs);fin.className='finish-time set';}
  bot.appendChild(fin);
  const calBtn=document.createElement('button');
  calBtn.className='btn-cal';calBtn.id='calbtn_'+row.id;calBtn.title='Add to Calendar';calBtn.textContent='📅';
  calBtn.style.display=row.targetMs?'':'none';
  calBtn.onclick=()=>downloadICS(row.id);
  bot.appendChild(calBtn);
  return bot;
}

/* ── Table rendering ── */
function renderTable(){
  bathCalcOffset=null;
  const box=document.getElementById('offsetBox');box.className='offset-box';box.textContent='Waiting for reference row input...';
  document.getElementById('tbody').innerHTML='';
  document.getElementById('notesInput').value=sheetsData[currentSheetIdx].notes||'';
  const sheet=sheetsData[currentSheetIdx];
  renderRefRow(sheet);
  sheet.rows.forEach(row=>row.type==='ramp'?renderRampRow(row):renderDataRow(row));
}

function renderRefRow(sheet){
  const tbody=document.getElementById('tbody');
  const tr=document.createElement('tr');tr.className='ref-row';

  const tdNum=document.createElement('td');tdNum.className='td-num row-num';tdNum.innerHTML='<span class="ref-badge">REF</span>';tr.appendChild(tdNum);

  const tdInd=document.createElement('td');tdInd.className='td-a';
  const indIn=document.createElement('input');
  indIn.type='number';indIn.step='any';indIn.className='bath-input';indIn.id='ind_ref';indIn.placeholder='0.00';indIn.value=sheet.refInd;
  indIn.addEventListener('input',()=>{sheet.refInd=indIn.value;recalcBathOffset();saveToStorage();});
  tdInd.appendChild(indIn);tr.appendChild(tdInd);

  const tdBath=document.createElement('td');tdBath.className='td-b';
  const bathIn=document.createElement('input');
  bathIn.type='number';bathIn.step='any';bathIn.className='bath-input';bathIn.id='bath_ref';bathIn.placeholder='0.00';bathIn.value=sheet.refBath;
  bathIn.addEventListener('input',()=>{sheet.refBath=bathIn.value;recalcBathOffset();saveToStorage();});
  tdBath.appendChild(bathIn);tr.appendChild(tdBath);

  const tdSC=document.createElement('td');tdSC.className='td-sc';tdSC.style.color='#1a1a1a';tdSC.textContent='—';tr.appendChild(tdSC);
  const tdDel=document.createElement('td');tdDel.className='td-del';tr.appendChild(tdDel);
  tbody.appendChild(tr);
  if(sheet.refInd!==''||sheet.refBath!=='')recalcBathOffset();
}

function renderDataRow(row){
  const tbody=document.getElementById('tbody'),sheet=sheetsData[currentSheetIdx];
  const idx=sheet.rows.indexOf(row)+1;
  const tr=document.createElement('tr');tr.id='tr_'+row.id;tr.className='data-row';

  const tdNum=document.createElement('td');tdNum.className='td-num row-num';tdNum.textContent=idx;tr.appendChild(tdNum);

  const tdInd=document.createElement('td');tdInd.className='td-a';
  const indIn=document.createElement('input');
  indIn.type='number';indIn.step='any';indIn.className='bath-input';indIn.id='ind_'+row.id;indIn.placeholder='0.00';indIn.value=row.indVal||'';
  indIn.addEventListener('input',()=>{row.indVal=indIn.value;recalcAllBath();saveToStorage();});
  tdInd.appendChild(indIn);tr.appendChild(tdInd);

  const tdBath=document.createElement('td');tdBath.className='td-b';tdBath.id='bath_'+row.id;
  const ip=parseFloat(row.indVal);
  if(bathCalcOffset!==null&&!isNaN(ip)){tdBath.textContent=(ip+bathCalcOffset).toFixed(2);tdBath.className='td-b calc-value';}
  else{tdBath.textContent='—';tdBath.className='td-b calc-value calc-empty';}
  tr.appendChild(tdBath);

  const tdSC=document.createElement('td');tdSC.className='td-sc sc-cell';
  // Line 1: datetime + duration + play
  const line1=document.createElement('div');line1.className='sc-line';
  const startIn=document.createElement('input');
  startIn.type='datetime-local';startIn.className='dt-input';startIn.id='start_'+row.id;startIn.value=row.startDateStr||'';
  startIn.addEventListener('change',()=>{row.startDateStr=startIn.value;saveToStorage();});
  line1.appendChild(startIn);
  const durIn=document.createElement('input');
  durIn.type='text';durIn.className='dur-input';durIn.id='dur_'+row.id;durIn.placeholder='hh:mm:ss';durIn.value=row.durationStr||'';
  durIn.addEventListener('change',()=>{row.durationStr=durIn.value;saveToStorage();});
  line1.appendChild(durIn);
  const playBtn=document.createElement('button');
  playBtn.className='btn-play';playBtn.id='playbtn_'+row.id;playBtn.innerHTML=SVG_PLAY;
  playBtn.onclick=()=>toggleRowTimer(row.id);
  line1.appendChild(playBtn);
  tdSC.appendChild(line1);
  tdSC.appendChild(buildScBottom(row));
  tr.appendChild(tdSC);

  const tdDel=document.createElement('td');tdDel.className='td-del';
  const delBtn=document.createElement('button');delBtn.className='btn-del';delBtn.textContent='✕';
  delBtn.onclick=()=>{stopRowTimer(row.id);sheet.rows=sheet.rows.filter(r=>r.id!==row.id);tbody.removeChild(tr);renumberRows();recalcAllBath();saveToStorage();};
  tdDel.appendChild(delBtn);tr.appendChild(tdDel);
  tbody.appendChild(tr);
}

function renderRampRow(row){
  const tbody=document.getElementById('tbody'),sheet=sheetsData[currentSheetIdx];
  const idx=sheet.rows.indexOf(row)+1;
  const tr=document.createElement('tr');tr.id='tr_'+row.id;tr.className='ramp-row';

  const tdNum=document.createElement('td');tdNum.className='td-num';
  tdNum.innerHTML='<span class="ramp-badge">RAMP</span><div style="font-size:0.65rem;color:#3a3a5a;margin-top:2px">'+idx+'</div>';
  tr.appendChild(tdNum);

  const tdS=document.createElement('td');tdS.className='td-a';
  const sDiv=document.createElement('div');sDiv.className='temp-cell';
  const sLbl=document.createElement('span');sLbl.className='temp-lbl tl-s';sLbl.textContent='Start °C';
  const sTIn=document.createElement('input');
  sTIn.type='number';sTIn.step='any';sTIn.className='temp-input';sTIn.id='st_'+row.id;sTIn.placeholder='0.00';sTIn.value=row.startTemp||'';
  sTIn.addEventListener('input',()=>{row.startTemp=sTIn.value;updateRampDerived(row);saveToStorage();});
  sDiv.appendChild(sLbl);sDiv.appendChild(sTIn);tdS.appendChild(sDiv);tr.appendChild(tdS);

  const tdE=document.createElement('td');tdE.className='td-b';
  const eDiv=document.createElement('div');eDiv.className='temp-cell';
  const eLbl=document.createElement('span');eLbl.className='temp-lbl tl-e';eLbl.textContent='End °C';
  const eTIn=document.createElement('input');
  eTIn.type='number';eTIn.step='any';eTIn.className='temp-input';eTIn.id='et_'+row.id;eTIn.placeholder='0.00';eTIn.value=row.endTemp||'';
  eTIn.addEventListener('input',()=>{row.endTemp=eTIn.value;updateRampDerived(row);saveToStorage();});
  eDiv.appendChild(eLbl);eDiv.appendChild(eTIn);tdE.appendChild(eDiv);tr.appendChild(tdE);

  const tdSC=document.createElement('td');tdSC.className='td-sc sc-cell';
  // Line 1: datetime + play
  const l1=document.createElement('div');l1.className='sc-line';
  const dtIn=document.createElement('input');
  dtIn.type='datetime-local';dtIn.className='dt-input';dtIn.id='start_'+row.id;dtIn.value=row.startDateStr||'';
  dtIn.addEventListener('change',()=>{row.startDateStr=dtIn.value;saveToStorage();});
  l1.appendChild(dtIn);
  const pb=document.createElement('button');
  pb.className='btn-play';pb.id='playbtn_'+row.id;pb.innerHTML=SVG_PLAY;
  pb.onclick=()=>toggleRowTimer(row.id);
  l1.appendChild(pb);
  tdSC.appendChild(l1);
  // Line 2: duration ↔ rate
  const l2=document.createElement('div');l2.className='sc-line';
  const durIn=document.createElement('input');
  durIn.type='text';durIn.className='dur-input';durIn.id='dur_'+row.id;durIn.placeholder='hh:mm:ss';durIn.value=row.durationStr||'';
  durIn.addEventListener('change',()=>{
    row.durationStr=durIn.value;row.lastEdited='dur';
    const r=calcRate(row.startTemp,row.endTemp,durIn.value);
    const rEl=document.getElementById('rate_'+row.id);if(rEl&&r!==''){rEl.value=r;row.rateStr=r;}
    saveToStorage();
  });
  const arrw=document.createElement('span');arrw.className='rate-lbl';arrw.textContent='↔';
  const rateIn=document.createElement('input');
  rateIn.type='text';rateIn.className='rate-input';rateIn.id='rate_'+row.id;rateIn.placeholder='°C/h';rateIn.value=row.rateStr||'';
  rateIn.addEventListener('change',()=>{
    row.rateStr=rateIn.value;row.lastEdited='rate';
    const dur=calcDur(row.startTemp,row.endTemp,rateIn.value);
    if(dur!==''){durIn.value=dur;row.durationStr=dur;}
    saveToStorage();
  });
  const rLbl=document.createElement('span');rLbl.className='rate-lbl';rLbl.textContent='°C/h';
  l2.appendChild(durIn);l2.appendChild(arrw);l2.appendChild(rateIn);l2.appendChild(rLbl);
  tdSC.appendChild(l2);
  tdSC.appendChild(buildScBottom(row));
  tr.appendChild(tdSC);

  const tdDel=document.createElement('td');tdDel.className='td-del';
  const delBtn=document.createElement('button');delBtn.className='btn-del';delBtn.textContent='✕';
  delBtn.onclick=()=>{stopRowTimer(row.id);sheet.rows=sheet.rows.filter(r=>r.id!==row.id);tbody.removeChild(tr);renumberRows();saveToStorage();};
  tdDel.appendChild(delBtn);tr.appendChild(tdDel);
  tbody.appendChild(tr);
}

function renumberRows(){
  sheetsData[currentSheetIdx].rows.forEach((row,idx)=>{
    if(row.type==='ramp'){
      const el=document.querySelector('#tr_'+row.id+' .td-num div');if(el)el.textContent=idx+1;
    }else{
      const el=document.querySelector('#tr_'+row.id+' .row-num');if(el)el.textContent=idx+1;
    }
  });
}

function addDataRow(){
  const sheet=sheetsData[currentSheetIdx];
  const row={id:++rowIdCounter,type:'data',indVal:'',startDateStr:'',durationStr:'',targetMs:null};
  sheet.rows.push(row);renderDataRow(row);saveToStorage();
  setTimeout(()=>{const el=document.getElementById('ind_'+row.id);if(el){el.focus();el.scrollIntoView({behavior:'smooth',block:'nearest'});}},30);
}
function addRampRow(){
  const sheet=sheetsData[currentSheetIdx];
  const row={id:++rowIdCounter,type:'ramp',startTemp:getLastTemp(),endTemp:'',startDateStr:'',durationStr:'',rateStr:'',lastEdited:'dur',targetMs:null};
  sheet.rows.push(row);renderRampRow(row);saveToStorage();
  setTimeout(()=>{const el=document.getElementById('st_'+row.id);if(el){el.focus();el.scrollIntoView({behavior:'smooth',block:'nearest'});}},30);
}

/* ── Sheets ── */
function saveCurrentSheetMeta(){
  const sheet=sheetsData[currentSheetIdx];
  const rig=parseInt(document.getElementById('rigNumber').value);
  sheet.rigNumber=isNaN(rig)?3:rig;sheet.name='RIG '+sheet.rigNumber;
  sheet.refInd=document.getElementById('ind_ref')?.value||'';
  sheet.refBath=document.getElementById('bath_ref')?.value||'';
  sheet.notes=document.getElementById('notesInput')?.value||'';
  stopAllTimers();
}
function switchSheet(idx){
  if(idx===currentSheetIdx)return;
  saveCurrentSheetMeta();currentSheetIdx=idx;
  document.getElementById('rigNumber').value=sheetsData[idx].rigNumber;
  renderTable();updateSheetTabs();saveToStorage();
}
function addSheet(){
  saveCurrentSheetMeta();
  sheetsData.push({name:'RIG 3',rigNumber:3,refInd:'',refBath:'',notes:'',rows:[]});
  currentSheetIdx=sheetsData.length-1;
  document.getElementById('rigNumber').value=3;
  renderTable();updateSheetTabs();saveToStorage();
}
function deleteSheet(idx){
  if(sheetsData.length<=1)return;
  stopAllTimers();sheetsData.splice(idx,1);
  if(currentSheetIdx>=sheetsData.length)currentSheetIdx=sheetsData.length-1;
  document.getElementById('rigNumber').value=sheetsData[currentSheetIdx].rigNumber;
  renderTable();updateSheetTabs();saveToStorage();
}
function updateSheetTabs(){
  const bar=document.getElementById('sheetBar');bar.innerHTML='';
  sheetsData.forEach((sheet,idx)=>{
    const tab=document.createElement('div');tab.className='sheet-tab'+(idx===currentSheetIdx?' active':'');
    const nm=document.createElement('span');nm.className='sheet-tab-name';nm.textContent=sheet.name;nm.onclick=()=>switchSheet(idx);tab.appendChild(nm);
    if(sheetsData.length>1){
      const d=document.createElement('button');d.className='sheet-tab-del';d.title='Delete';d.textContent='×';
      d.onclick=e=>{e.stopPropagation();if(confirm('Delete '+sheet.name+'?'))deleteSheet(idx);};tab.appendChild(d);
    }
    bar.appendChild(tab);
  });
  const ab=document.createElement('button');ab.className='sheet-add-btn';ab.textContent='+';ab.title='New sheet';ab.onclick=addSheet;bar.appendChild(ab);
}

/* ── Init ── */
const restored=loadFromStorage();
document.getElementById('rigNumber').value=sheetsData[currentSheetIdx].rigNumber;
renderTable();updateSheetTabs();
if(!restored){for(let i=0;i<3;i++)addDataRow();}
syncTime();setInterval(syncTime,300000);

// ── PWA Service Worker ──
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js')
      .then(r=>console.log('SW registered:', r.scope))
      .catch(e=>console.log('SW error:', e));
  });
}
</script>
</body>
</html>
